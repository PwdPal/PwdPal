    <rect x="4" y="22" width="32" height="24" rx="4" fill="currentColor"/>
    <!-- Lock shackle -->
    <path d="M11 22V16a9 9 0 0 1 18 0v6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="20" cy="33" r="4" fill="var(--bg, #fff)"/>
    <rect x="18.5" y="33" width="3" height="5" rx="1" fill="var(--bg, #fff)"/>
  </g>
  <!-- "Pwd" bold -->
  <text x="50" y="42" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="currentColor">Pwd</text>
  <!-- "Pal" regular -->
  <text x="162" y="42" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="44" font-weight="400" fill="currentColor">Pal</text>
