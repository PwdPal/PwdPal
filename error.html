<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PwdPal — Something went wrong</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect x='8' y='24' width='32' height='20' rx='4' fill='%232c71e9'/><path d='M15 24V18a9 9 0 0 1 18 0v6' fill='none' stroke='%232c71e9' stroke-width='4' stroke-linecap='round'/><circle cx='24' cy='33' r='3.5' fill='white'/><rect x='22.5' y='33' width='3' height='4.5' rx='1' fill='white'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #202124;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .lock-icon {
      margin-bottom: 28px;
    }

    .lock-icon svg {
      width: 64px;
      height: 64px;
      color: #2c71e9;
      opacity: 0.25;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #202124;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #5f6368;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 10px 28px;
      background: #2c71e9;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn:hover {
      background: #1a5bc7;
      transform: scale(1.03);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .error-code {
      margin-top: 32px;
      font-size: 12px;
      color: #bdc1c6;
      letter-spacing: 0.5px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
      h1 { color: #e0e0e0; }
      p { color: #9aa0a6; }
      .error-code { color: #5f6368; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="lock-icon">
      <svg viewBox="0 0 48 48" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="24" width="32" height="20" rx="4"/>
        <path d="M15 24V18a9 9 0 0 1 18 0v6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <circle cx="24" cy="33" r="3.5" fill="#fff"/>
        <rect x="22.5" y="33" width="3" height="4.5" rx="1" fill="#fff"/>
      </svg>
    </div>
    <h1>Something went wrong</h1>
    <p>An unexpected error occurred. Your data is safe — nothing is stored on our servers.</p>
    <a href="/" class="btn">Back to PwdPal</a>
    <div class="error-code">ERR_UNKNOWN</div>
  </div>
</body>
</html>
